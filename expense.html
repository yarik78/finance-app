<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расходы | Мониторинг финансов</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #4a6cf7;
            --success: #2ecc71;
            --danger: #e74c3c;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e1e5eb;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.05);
            --radius: 16px;
            --expense-bg: #fdedec;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 12px;
        }

        .app {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Навигация */
        .nav {
            display: flex;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 4px;
            box-shadow: var(--shadow);
            gap: 4px;
        }
        .nav a {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
            color: var(--text-light);
        }
        .nav a.active {
            background: var(--expense-bg);
            color: #c0392b;
        }
        .nav a:not(.active):hover {
            background: #f5f6fa;
        }

        /* Заголовок */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 4px;
        }
        .header .icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #e74c3c, #ec7063);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Карточка баланса расходов */
        .balance-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .balance-card .label {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .balance-card .amount {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--danger);
        }
        .balance-card .subtitle {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* Форма */
        .form-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
        }
        .form-card h3 {
            font-size: 15px;
            margin-bottom: 16px;
            color: var(--text);
        }
        .form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 130px;
        }
        .form-group label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background: #fafbfc;
            transition: 0.2s;
            outline: none;
            width: 100%;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--danger);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
        }
        .btn-add {
            padding: 10px 20px;
            background: var(--danger);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            white-space: nowrap;
            height: 42px;
        }
        .btn-add:hover {
            background: #c0392b;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
            transform: translateY(-1px);
        }

        /* Список */
        .list-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .list-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #c0392b;
            background: #fef9f9;
        }
        .transaction-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .transaction-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #f9f9f9;
            transition: 0.15s;
            gap: 12px;
        }
        .transaction-item:hover { background: #fafbfc; }
        .transaction-info { flex: 1; min-width: 0; }
        .transaction-info .category { font-weight: 600; font-size: 13px; }
        .transaction-info .date { font-size: 11px; color: #b0b8c1; }
        .transaction-amount {
            font-weight: 700;
            font-size: 14px;
            white-space: nowrap;
            color: var(--danger);
        }
        .btn-delete {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 6px;
            border-radius: 6px;
            transition: 0.2s;
            color: #d5d8dc;
            flex-shrink: 0;
        }
        .btn-delete:hover { background: #fee; color: var(--danger); }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #bdc3c7;
        }
        .empty-state .icon { font-size: 36px; margin-bottom: 8px; }

        @media (max-width: 500px) {
            .form-row { flex-direction: column; }
            .btn-add { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Навигация -->
        <div class="nav">
            <a href="income.html">🟢 Доходы</a>
            <a href="expense.html" class="active">🔴 Расходы</a>
        </div>

        <!-- Заголовок -->
        <div class="header">
            <div class="icon">📉</div>
            <h1>Расходы</h1>
        </div>

        <!-- Карточка баланса -->
        <div class="balance-card">
            <div class="label">Всего расходов</div>
            <div class="amount" id="totalExpenseAmount">0 ₽</div>
            <div class="subtitle" id="expenseCount">0 записей</div>
        </div>

        <!-- Форма добавления -->
        <div class="form-card">
            <h3>➕ Добавить расход</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Сумма</label>
                    <input type="number" id="expenseAmount" placeholder="0" step="0.01" min="0.01">
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <select id="expenseCategory">
                        <option value="Продукты">🛒 Продукты</option>
                        <option value="Транспорт">🚌 Транспорт</option>
                        <option value="Развлечения">🎬 Развлечения</option>
                        <option value="Здоровье">💊 Здоровье</option>
                        <option value="Жильё">🏠 Жильё</option>
                        <option value="Связь">📱 Связь</option>
                        <option value="Одежда">👕 Одежда</option>
                        <option value="Кафе/рестораны">🍽️ Кафе</option>
                        <option value="Красота">💇 Красота</option>
                        <option value="Другое">📦 Другое</option>
                    </select>
                </div>
                <button class="btn-add" id="btnAddExpense">Добавить</button>
            </div>
        </div>

        <!-- Список расходов -->
        <div class="list-card">
            <div class="list-header">📋 История расходов</div>
            <div class="transaction-list" id="expenseList">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>Пока нет записей о расходах</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'finance_expense_data';

        function loadTransactions() {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
        }

        function saveTransactions(transactions) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
        }

        let transactions = loadTransactions();

        const expenseAmount = document.getElementById('expenseAmount');
        const expenseCategory = document.getElementById('expenseCategory');
        const btnAddExpense = document.getElementById('btnAddExpense');
        const expenseList = document.getElementById('expenseList');
        const totalExpenseAmount = document.getElementById('totalExpenseAmount');
        const expenseCount = document.getElementById('expenseCount');

        function formatCurrency(amount) {
            return amount.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + ' ₽';
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${day}.${month}.${year} ${hours}:${minutes}`;
        }

        function getRecordWord(count) {
            if (count % 10 === 1 && count % 100 !== 11) return 'запись';
            if ([2, 3, 4].includes(count % 10) && ![12, 13, 14].includes(count % 100)) return 'записи';
            return 'записей';
        }

        function render() {
            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            const total = transactions.reduce((sum, t) => sum + t.amount, 0);

            totalExpenseAmount.textContent = formatCurrency(total);
            expenseCount.textContent = transactions.length + ' ' + getRecordWord(transactions.length);

            if (sorted.length === 0) {
                expenseList.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Пока нет записей о расходах</p></div>';
            } else {
                expenseList.innerHTML = sorted.map(t => `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <div class="category">${t.category}</div>
                            <div class="date">${formatDate(t.date)}</div>
                        </div>
                        <div class="transaction-amount">−${formatCurrency(t.amount)}</div>
                        <button class="btn-delete" data-id="${t.id}" title="Удалить">✕</button>
                    </div>
                `).join('');
            }

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    transactions = transactions.filter(t => t.id !== id);
                    saveTransactions(transactions);
                    render();
                });
            });

            saveTransactions(transactions);
        }

        function addExpense() {
            const amount = parseFloat(expenseAmount.value);
            if (isNaN(amount) || amount <= 0) {
                alert('Введите корректную сумму расхода');
                expenseAmount.focus();
                return;
            }

            transactions.push({
                id: Date.now().toString(),
                amount: amount,
                category: expenseCategory.value,
                date: new Date().toISOString()
            });

            expenseAmount.value = '';
            expenseAmount.focus();
            saveTransactions(transactions);
            render();
        }

        btnAddExpense.addEventListener('click', addExpense);
        expenseAmount.addEventListener('keypress', e => { if (e.key === 'Enter') addExpense(); });

        render();
    </script>
</body>
</html>
