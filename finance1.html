<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг финансов</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #4a6cf7;
            --danger: #e74c3c;
            --success: #2ecc71;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e1e5eb;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.05);
            --radius: 16px;
            --income-bg: #eafaf1;
            --expense-bg: #fdedec;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 12px;
        }

        .app {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Заголовок */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 4px;
        }
        .header .icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #4a6cf7, #6c8cff);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Карточка баланса */
        .balance-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px 28px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .balance-info .label {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .balance-info .amount {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .balance-info .amount.positive {
            color: var(--success);
        }
        .balance-info .amount.negative {
            color: var(--danger);
        }
        .balance-stats {
            display: flex;
            gap: 30px;
        }
        .balance-stats .stat {
            text-align: right;
        }
        .balance-stats .stat-label {
            font-size: 11px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .stat-income {
            color: var(--success);
            font-weight: 700;
            font-size: 20px;
        }
        .stat-expense {
            color: var(--danger);
            font-weight: 700;
            font-size: 20px;
        }

        /* Две колонки */
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .column {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .column-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 16px;
        }
        .column-header.income-header {
            background: #f8fdf9;
            color: #1e8449;
        }
        .column-header.expense-header {
            background: #fef9f9;
            color: #c0392b;
        }
        .column-header .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .column-header .dot.income-dot {
            background: var(--success);
        }
        .column-header .dot.expense-dot {
            background: var(--danger);
        }
        .column-total {
            margin-left: auto;
            font-size: 14px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .income-header .column-total {
            background: #eafaf1;
            color: #1e8449;
        }
        .expense-header .column-total {
            background: #fdedec;
            color: #c0392b;
        }

        .column-body {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .form-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 0;
        }
        .form-group label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }
        .form-group input,
        .form-group select {
            padding: 9px 10px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 13px;
            font-family: inherit;
            background: #fafbfc;
            transition: 0.2s;
            outline: none;
            width: 100%;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.08);
        }
        .income-column .form-group input:focus,
        .income-column .form-group select:focus {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }
        .expense-column .form-group input:focus,
        .expense-column .form-group select:focus {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
        }
        .btn-add {
            padding: 9px 14px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            color: #fff;
            white-space: nowrap;
            height: 39px;
            flex-shrink: 0;
        }
        .btn-add.income-btn {
            background: var(--success);
        }
        .btn-add.income-btn:hover {
            background: #27ae60;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
            transform: translateY(-1px);
        }
        .btn-add.expense-btn {
            background: var(--danger);
        }
        .btn-add.expense-btn:hover {
            background: #c0392b;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
            transform: translateY(-1px);
        }

        /* Списки */
        .transaction-list {
            max-height: 320px;
            overflow-y: auto;
            border-top: 1px solid #f0f0f0;
        }
        .transaction-item {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #f9f9f9;
            transition: 0.15s;
            gap: 10px;
        }
        .transaction-item:hover {
            background: #fafbfc;
        }
        .transaction-info {
            flex: 1;
            min-width: 0;
        }
        .transaction-info .category {
            font-weight: 600;
            font-size: 13px;
            color: var(--text);
        }
        .transaction-info .date {
            font-size: 10px;
            color: #b0b8c1;
        }
        .transaction-amount {
            font-weight: 700;
            font-size: 13px;
            white-space: nowrap;
        }
        .transaction-amount.income {
            color: var(--success);
        }
        .transaction-amount.expense {
            color: var(--danger);
        }
        .btn-delete {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 5px;
            border-radius: 6px;
            transition: 0.2s;
            color: #d5d8dc;
            flex-shrink: 0;
            line-height: 1;
        }
        .btn-delete:hover {
            background: #fee;
            color: var(--danger);
        }
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #bdc3c7;
            font-size: 12px;
        }
        .empty-state .icon {
            font-size: 28px;
            margin-bottom: 6px;
        }

        /* Адаптив */
        @media (max-width: 750px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
            .balance-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .balance-stats {
                flex-direction: row;
                gap: 20px;
            }
            .balance-stats .stat {
                text-align: left;
            }
            .form-row {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Заголовок -->
        <div class="header">
            <div class="icon">💰</div>
            <h1>Мониторинг финансов</h1>
        </div>

        <!-- Карточка баланса -->
        <div class="balance-card">
            <div class="balance-info">
                <div class="label">Текущий баланс</div>
                <div class="amount positive" id="balanceAmount">0 ₽</div>
            </div>
            <div class="balance-stats">
                <div class="stat">
                    <div class="stat-label">Доходы</div>
                    <div class="stat-income" id="totalIncome">0 ₽</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Расходы</div>
                    <div class="stat-expense" id="totalExpense">0 ₽</div>
                </div>
            </div>
        </div>

        <!-- Две колонки -->
        <div class="two-columns">
            <!-- ========== КОЛОНКА ДОХОДОВ ========== -->
            <div class="column income-column">
                <div class="column-header income-header">
                    <span class="dot income-dot"></span> Доходы
                    <span class="column-total" id="incomeColumnTotal">0 ₽</span>
                </div>
                <div class="column-body">
                    <div class="form-row">
                        <div class="form-group" style="flex: 1;">
                            <label>Сумма</label>
                            <input type="number" id="incomeAmount" placeholder="0" step="0.01" min="0.01">
                        </div>
                        <div class="form-group" style="flex: 1.5;">
                            <label>Категория</label>
                            <select id="incomeCategory">
                                <option value="Зарплата">💼 Зарплата</option>
                                <option value="Подработка">🔧 Подработка</option>
                                <option value="Инвестиции">📈 Инвестиции</option>
                                <option value="Подарок">🎁 Подарок</option>
                                <option value="Кэшбэк">💳 Кэшбэк</option>
                                <option value="Продажа">🏷️ Продажа</option>
                                <option value="Аренда">🏠 Аренда</option>
                                <option value="Другое">📦 Другое</option>
                            </select>
                        </div>
                        <button class="btn-add income-btn" id="btnAddIncome">+</button>
                    </div>
                </div>
                <div class="transaction-list" id="incomeList">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        Нет записей о доходах
                    </div>
                </div>
            </div>

            <!-- ========== КОЛОНКА РАСХОДОВ ========== -->
            <div class="column expense-column">
                <div class="column-header expense-header">
                    <span class="dot expense-dot"></span> Расходы
                    <span class="column-total" id="expenseColumnTotal">0 ₽</span>
                </div>
                <div class="column-body">
                    <div class="form-row">
                        <div class="form-group" style="flex: 1;">
                            <label>Сумма</label>
                            <input type="number" id="expenseAmount" placeholder="0" step="0.01" min="0.01">
                        </div>
                        <div class="form-group" style="flex: 1.5;">
                            <label>Категория</label>
                            <select id="expenseCategory">
                                <option value="Продукты">🛒 Продукты</option>
                                <option value="Транспорт">🚌 Транспорт</option>
                                <option value="Развлечения">🎬 Развлечения</option>
                                <option value="Здоровье">💊 Здоровье</option>
                                <option value="Жильё">🏠 Жильё</option>
                                <option value="Связь">📱 Связь</option>
                                <option value="Одежда">👕 Одежда</option>
                                <option value="Кафе">🍽️ Кафе</option>
                                <option value="Красота">💇 Красота</option>
                                <option value="Другое">📦 Другое</option>
                            </select>
                        </div>
                        <button class="btn-add expense-btn" id="btnAddExpense">+</button>
                    </div>
                </div>
                <div class="transaction-list" id="expenseList">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        Нет записей о расходах
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== ХРАНИЛИЩЕ ====================
        const STORAGE_KEY = 'finance_app_v3';

        function loadTransactions() {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
        }

        function saveTransactions(transactions) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
        }

        let transactions = loadTransactions();

        // ==================== DOM ====================
        // Доходы
        const incomeAmount = document.getElementById('incomeAmount');
        const incomeCategory = document.getElementById('incomeCategory');
        const btnAddIncome = document.getElementById('btnAddIncome');
        const incomeList = document.getElementById('incomeList');
        const incomeColumnTotal = document.getElementById('incomeColumnTotal');

        // Расходы
        const expenseAmount = document.getElementById('expenseAmount');
        const expenseCategory = document.getElementById('expenseCategory');
        const btnAddExpense = document.getElementById('btnAddExpense');
        const expenseList = document.getElementById('expenseList');
        const expenseColumnTotal = document.getElementById('expenseColumnTotal');

        // Баланс
        const balanceAmount = document.getElementById('balanceAmount');
        const totalIncome = document.getElementById('totalIncome');
        const totalExpense = document.getElementById('totalExpense');

        // ==================== ФОРМАТИРОВАНИЕ ====================
        function formatCurrency(amount) {
            return amount.toLocaleString('ru-RU', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }) + ' ₽';
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${day}.${month}.${year} ${hours}:${minutes}`;
        }

        // ==================== ОТРИСОВКА ====================
        function render() {
            const incomeTransactions = transactions.filter(t => t.type === 'income');
            const expenseTransactions = transactions.filter(t => t.type === 'expense');

            const sortByDate = (a, b) => new Date(b.date) - new Date(a.date);
            const sortedIncome = [...incomeTransactions].sort(sortByDate);
            const sortedExpense = [...expenseTransactions].sort(sortByDate);

            // Суммы
            const incomeSum = incomeTransactions.reduce((sum, t) => sum + t.amount, 0);
            const expenseSum = expenseTransactions.reduce((sum, t) => sum + t.amount, 0);
            const balance = incomeSum - expenseSum;

            // Баланс
            balanceAmount.textContent = (balance >= 0 ? '+' : '') + formatCurrency(balance);
            balanceAmount.className = 'amount ' + (balance >= 0 ? 'positive' : 'negative');
            totalIncome.textContent = formatCurrency(incomeSum);
            totalExpense.textContent = formatCurrency(expenseSum);

            // Суммы в заголовках колонок
            incomeColumnTotal.textContent = formatCurrency(incomeSum);
            expenseColumnTotal.textContent = formatCurrency(expenseSum);

            // Список доходов
            if (sortedIncome.length === 0) {
                incomeList.innerHTML = '<div class="empty-state"><div class="icon">📭</div>Нет записей о доходах</div>';
            } else {
                incomeList.innerHTML = sortedIncome.map(t => `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <div class="category">${t.category}</div>
                            <div class="date">${formatDate(t.date)}</div>
                        </div>
                        <div class="transaction-amount income">+${formatCurrency(t.amount)}</div>
                        <button class="btn-delete" data-id="${t.id}" title="Удалить">✕</button>
                    </div>
                `).join('');
            }

            // Список расходов
            if (sortedExpense.length === 0) {
                expenseList.innerHTML = '<div class="empty-state"><div class="icon">📭</div>Нет записей о расходах</div>';
            } else {
                expenseList.innerHTML = sortedExpense.map(t => `
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <div class="category">${t.category}</div>
                            <div class="date">${formatDate(t.date)}</div>
                        </div>
                        <div class="transaction-amount expense">−${formatCurrency(t.amount)}</div>
                        <button class="btn-delete" data-id="${t.id}" title="Удалить">✕</button>
                    </div>
                `).join('');
            }

            // Обработчики удаления
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    transactions = transactions.filter(t => t.id !== id);
                    saveTransactions(transactions);
                    render();
                });
            });

            saveTransactions(transactions);
        }

        // ==================== ДОБАВЛЕНИЕ ====================
        function addIncome() {
            const amount = parseFloat(incomeAmount.value);
            if (isNaN(amount) || amount <= 0) {
                alert('Введите корректную сумму дохода');
                incomeAmount.focus();
                return;
            }

            transactions.push({
                id: Date.now().toString(),
                amount: amount,
                category: incomeCategory.value,
                type: 'income',
                date: new Date().toISOString()
            });

            incomeAmount.value = '';
            incomeAmount.focus();
            render();
        }

        function addExpense() {
            const amount = parseFloat(expenseAmount.value);
            if (isNaN(amount) || amount <= 0) {
                alert('Введите корректную сумму расхода');
                expenseAmount.focus();
                return;
            }

            transactions.push({
                id: Date.now().toString(),
                amount: amount,
                category: expenseCategory.value,
                type: 'expense',
                date: new Date().toISOString()
            });

            expenseAmount.value = '';
            expenseAmount.focus();
            render();
        }

        btnAddIncome.addEventListener('click', addIncome);
        btnAddExpense.addEventListener('click', addExpense);

        incomeAmount.addEventListener('keypress', e => { if (e.key === 'Enter') addIncome(); });
        expenseAmount.addEventListener('keypress', e => { if (e.key === 'Enter') addExpense(); });

        // ==================== ПЕРВИЧНАЯ ОТРИСОВКА ====================
        render();
    </script>
</body>
</html>
